name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/agasa-alert/**'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installer les dépendances
        run: pnpm install

      - name: Expo Prebuild
        working-directory: artifacts/agasa-alert
        env:
          EXPO_PUBLIC_DOMAIN: c57b1487-dd5e-4b82-8e03-6bab283740d8-00-1xwlq55t1l078.picard.replit.dev
          EXPO_PUBLIC_SUPABASE_URL: https://mdcbhlwcpttapkicpeea.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_B6g1ZcnfKDiOXji0JW40PA_K48SP937
        run: npx expo prebuild --platform android --clean --no-install

      - name: Rendre Gradlew exécutable
        working-directory: artifacts/agasa-alert/android
        run: chmod +x gradlew

      - name: Compiler l'APK
        working-directory: artifacts/agasa-alert/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Téléverser l'APK
        uses: actions/upload-artifact@v4
        with:
          name: AGASA-Alert-APK
          path: artifacts/agasa-alert/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
